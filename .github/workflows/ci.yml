name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (include submodules)
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: |
          cd demo
          mvn clean package

      - name: Run tests
        run: |
          cd demo
          mvn test

  docker-deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (include submodules)
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-staging:latest ./demo
          docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-production:latest ./demo

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/demo-staging:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/demo-production:latest

      - name: Deploy to Staging (EC2)
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker stop staging || true
            docker rm -f staging || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/demo-staging:latest
            docker run -d -p 8081:8080 --name staging ${{ secrets.DOCKER_USERNAME }}/demo-staging:latest

  deploy-production:
    needs: docker-deploy
    runs-on: ubuntu-latest


    environment:
      name: production

    steps:
      - name: Deploy to Production (EC2)
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker stop production || true
            docker rm -f production || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/demo-production:latest
            docker run -d -p 8082:8080 --name production ${{ secrets.DOCKER_USERNAME }}/demo-production:latest